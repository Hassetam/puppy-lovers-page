<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Puppy Lovers Page</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="header">
        <h2>Puppy Lovers Page</h2>
    </header>

    <main>

        <section class="banner">
            <img src="banner-puppies.jpg" alt="Puppy Banner">
        </section>

        <section class="pictures">

            <div class="puppy">
                <img src="puppy-1.jpg" alt="Puppy 1">
            </div>

            <div class="text">
                <p>
                    Puppy <br>
                    Missing <br>
                    Here!!
                </p>
            </div>

            <div class="puppy">
                <img src="puppy-2.jpg" alt="Puppy 2">
            </div>

        </section>

        <section class="more">
            <h2>More Puppies</h2>

            <div class="more-puppies">

                <div class="puppy-card">
                    <img src="puppy-3.jpg" alt="Puppy 3">
                </div>

                <div class="puppy-card">
                    <img src="puppy-4.jpg" alt="Puppy 4">
                </div>

            </div>
        </section>

    </main>

    <footer class="footer">
        <h3>Developed by: Hasset Adugna</h3>
    </footer>

</body>
</html>
